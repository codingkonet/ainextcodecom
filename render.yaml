services:
  - type: web
    name: ainextcode
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.1
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-5
      - key: AINEXTCODE_MODEL
        value: ainextcode-agent
      - key: AINEXTCODE_API_BASE_URL
        value: https://ai.ainextcode.com/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AINEXTCODE_API_KEY
        sync: false
